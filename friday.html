<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F.R.I.D.A.Y.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --amber: #ff8a3d;
    --amber-bright: #ffb066;
    --amber-dim: #a85a24;
    --bg: #0a0805;
    --bg2: #120d08;
    --line: #2a1f14;
    --text: #f2e4d4;
    --muted: #8a7860;
    --danger: #ff4d4d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    background: radial-gradient(ellipse at 50% 20%, #1a1108 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow:hidden;
  }
  #app{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding: 28px 20px 20px; position:relative;
  }
  .brand{
    font-family:'Orbitron',sans-serif; font-weight:800; letter-spacing:6px;
    font-size:15px; color:var(--amber-bright); text-shadow:0 0 12px rgba(255,138,61,.6);
  }
  .brand small{display:block; font-family:'Space Mono',monospace; letter-spacing:3px; font-size:9px; color:var(--muted); margin-top:4px; font-weight:400;}

  .stage{ position:relative; width:min(280px, 62vw); aspect-ratio:1/1; margin: 26px 0 14px; }
  .ring{
    position:absolute; inset:0; border-radius:50%;
    border:1px solid var(--line);
  }
  .ring.r2{ inset:14px; border-color:var(--amber-dim); opacity:.5; }
  .ring.r3{ inset:28px; }
  #core{
    position:absolute; inset:34%; border-radius:50%;
    background: radial-gradient(circle at 40% 35%, #ffd9a8, var(--amber) 45%, #7a3c14 100%);
    box-shadow: 0 0 30px 6px rgba(255,138,61,.35);
    transition: box-shadow .4s ease, transform .4s ease, filter .4s ease;
  }
  #app.idle #core{ box-shadow:0 0 14px 2px rgba(255,138,61,.15); filter:saturate(.5) brightness(.6); }
  #app.armed #core{ animation: pulse 1.4s ease-in-out infinite; box-shadow:0 0 26px 6px rgba(255,138,61,.4);}
  #app.awake #core, #app.thinking #core{ animation: pulse .9s ease-in-out infinite; box-shadow:0 0 46px 12px rgba(255,138,61,.65);}
  #app.speaking #core{ animation: speak .3s ease-in-out infinite alternate; box-shadow:0 0 55px 16px rgba(255,176,102,.8);}
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  @keyframes speak{ from{transform:scale(1);} to{transform:scale(1.1);} }

  .sweep{ position:absolute; inset:0; border-radius:50%; overflow:hidden; opacity:.5;}
  .sweep::before{
    content:''; position:absolute; inset:0;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(255,138,61,.5) 18deg, transparent 40deg);
    animation: spin 3.2s linear infinite;
  }
  #app.idle .sweep{opacity:.15;}
  @keyframes spin{ to{ transform: rotate(360deg); } }

  #meter{
    position:absolute; inset:-6px; border-radius:50%; pointer-events:none;
    box-shadow: 0 0 0 0 rgba(255,138,61,0);
  }

  .status{ font-family:'Orbitron',sans-serif; font-size:13px; letter-spacing:3px; color:var(--amber-bright); min-height:18px; text-align:center;}
  .sub{ font-size:11px; color:var(--muted); margin-top:6px; text-align:center; max-width:320px; line-height:1.5;}

  .transcript{
    width:100%; max-width:440px; flex:1; min-height:0; overflow-y:auto; margin-top:18px;
    border-top:1px solid var(--line); padding-top:12px;
  }
  .line{ font-size:12.5px; line-height:1.6; margin-bottom:10px; padding-left:10px; border-left:2px solid var(--line); }
  .line.you{ color:#d8c9b4; border-left-color:var(--muted);}
  .line.friday{ color:var(--amber-bright); border-left-color:var(--amber);}
  .line b{ font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px; display:block; margin-bottom:2px; opacity:.7;}

  .controls{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; justify-content:center;}
  button{
    font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:2px;
    background:transparent; border:1px solid var(--amber-dim); color:var(--amber-bright);
    padding:10px 16px; border-radius:4px; cursor:pointer; transition:.2s;
  }
  button:hover{ background:rgba(255,138,61,.12); border-color:var(--amber);}
  button:active{ transform:scale(.97);}
  button.danger{ border-color:#5a2222; color:#ff8a8a;}
  button:disabled{ opacity:.35; cursor:default;}

  #startOverlay{
    position:absolute; inset:0; background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center; padding:30px; z-index:10;
  }
  #startOverlay p{ color:var(--muted); font-size:12px; max-width:320px; line-height:1.6;}
  .err{ color:var(--danger); font-size:11px; max-width:320px; text-align:center; margin-top:10px; display:none;}
  .badge{ font-size:9px; letter-spacing:2px; color:var(--muted); border:1px solid var(--line); padding:4px 8px; border-radius:20px; margin-top:6px;}
</style>
</head>
<body>
<div id="app" class="idle">

  <div id="startOverlay">
    <div class="brand">F.R.I.D.A.Y.<small>VOICE INTERFACE v1.0</small></div>
    <p>Needs microphone access. Clap twice to arm, then say <b>"Hi Friday, wake up"</b>.<br><br>Works best in Chrome or Edge on desktop.</p>
    <button id="startBtn">INITIALIZE</button>
    <div class="err" id="startErr"></div>
  </div>

  <div class="brand">F.R.I.D.A.Y.<small>VOICE INTERFACE</small></div>

  <div class="stage">
    <div class="ring"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="sweep"></div>
    <div id="meter"></div>
    <div id="core"></div>
  </div>

  <div class="status" id="statusText">STANDBY</div>
  <div class="sub" id="subText">Clap twice to arm the wake listener.</div>

  <div class="transcript" id="transcript"></div>

  <div class="controls">
    <button id="armBtn">SIMULATE CLAP</button>
    <button id="stopBtn" class="danger">SLEEP</button>
  </div>
</div>

<script>
const app = document.getElementById('app');
const statusText = document.getElementById('statusText');
const subText = document.getElementById('subText');
const transcript = document.getElementById('transcript');
const meter = document.getElementById('meter');
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
const startErr = document.getElementById('startErr');
const armBtn = document.getElementById('armBtn');
const stopBtn = document.getElementById('stopBtn');

let audioCtx, analyser, micStream, dataArray;
let recognition = null;
let state = 'idle'; // idle -> armed -> awake -> thinking -> speaking -> back to armed/idle
let clapCount = 0;
let clapTimer = null;
let armWindowTimer = null;
let silenceReturnTimer = null;
const CLAP_THRESHOLD = 0.35;
const CLAP_COOLDOWN_MS = 250;
let lastClapAt = 0;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function setState(s, statusLabel, subLabel){
  state = s;
  app.className = s;
  if(statusLabel) statusText.textContent = statusLabel;
  if(subLabel) subText.textContent = subLabel;
}

function addLine(who, text){
  const div = document.createElement('div');
  div.className = 'line ' + (who === 'friday' ? 'friday' : 'you');
  div.innerHTML = '<b>' + (who === 'friday' ? 'FRIDAY' : 'YOU') + '</b>' + escapeHtml(text);
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
}
function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function speak(text, onEnd){
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.02; utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /female|samantha|zira|victoria/i.test(v.name)) || voices.find(v => v.lang === 'en-US') || voices[0];
  if(preferred) utter.voice = preferred;
  utter.onend = () => { if(onEnd) onEnd(); };
  window.speechSynthesis.speak(utter);
}

// ---------- Microphone + clap detection ----------
async function initMic(){
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  const src = audioCtx.createMediaStreamSource(micStream);
  src.connect(analyser);
  dataArray = new Uint8Array(analyser.fftSize);
  requestAnimationFrame(monitorAudio);
}

function monitorAudio(){
  if(analyser){
    analyser.getByteTimeDomainData(dataArray);
    let peak = 0;
    for(let i=0;i<dataArray.length;i++){
      const v = Math.abs(dataArray[i]-128)/128;
      if(v>peak) peak = v;
    }
    // visual meter glow proportional to volume
    meter.style.boxShadow = `0 0 ${Math.round(peak*60)}px ${Math.round(peak*14)}px rgba(255,138,61,${Math.min(peak*1.2,0.7)})`;

    if(peak > CLAP_THRESHOLD){
      const now = Date.now();
      if(now - lastClapAt > CLAP_COOLDOWN_MS){
        lastClapAt = now;
        registerClap();
      }
    }
  }
  requestAnimationFrame(monitorAudio);
}

function registerClap(){
  if(state !== 'idle') return; // only arm from idle
  clapCount++;
  clearTimeout(clapTimer);
  clapTimer = setTimeout(()=>{ clapCount = 0; }, 900);
  if(clapCount >= 2){
    clapCount = 0;
    armListening();
  }
}

function armListening(){
  setState('armed', 'ARMED', 'Listening for "Hi Friday, wake up"...');
  startWakeRecognition();
  clearTimeout(armWindowTimer);
  armWindowTimer = setTimeout(()=>{
    if(state === 'armed'){
      stopRecognitionSafely();
      setState('idle', 'STANDBY', 'Clap twice to arm the wake listener.');
    }
  }, 8000);
}

// ---------- Speech recognition ----------
function startWakeRecognition(){
  if(!SpeechRecognition) return;
  stopRecognitionSafely();
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e)=>{
    const said = e.results[0][0].transcript.toLowerCase();
    addLine('you', said);
    if(said.includes('friday')){
      clearTimeout(armWindowTimer);
      wakeUp();
    } else {
      setState('idle', 'STANDBY', "Didn't catch a wake phrase. Clap twice to try again.");
    }
  };
  recognition.onerror = ()=>{
    if(state === 'armed'){
      setState('idle', 'STANDBY', 'Clap twice to arm the wake listener.');
    }
  };
  recognition.onend = ()=>{};
  recognition.start();
}

function wakeUp(){
  setState('awake', 'ONLINE', "Hi boss, how's your day doing?");
  const greeting = "Hi boss. How's your day going?";
  addLine('friday', greeting);
  setState('speaking', 'SPEAKING', '');
  speak(greeting, ()=>{
    listenForQuestion();
  });
}

function listenForQuestion(){
  if(!SpeechRecognition){
    setState('idle','STANDBY','Speech recognition unavailable in this browser.');
    return;
  }
  setState('awake', 'LISTENING', 'Ask me anything...');
  stopRecognitionSafely();
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = async (e)=>{
    const question = e.results[0][0].transcript;
    addLine('you', question);
    if(/^(go to sleep|sleep|goodnight|stop listening|that's all|nothing else)/i.test(question.trim())){
      farewell();
      return;
    }
    await handleQuestion(question);
  };
  recognition.onerror = (e)=>{
    if(state === 'awake'){
      // brief silence/no-speech: return to idle after a moment
      returnToIdleAfterSilence();
    }
  };
  recognition.start();
}

function returnToIdleAfterSilence(){
  setState('idle', 'STANDBY', 'Clap twice to arm the wake listener.');
}

function farewell(){
  setState('speaking', 'SPEAKING', '');
  const bye = "Going back to standby, boss.";
  addLine('friday', bye);
  speak(bye, ()=>{
    conversationHistory = [];
    setState('idle', 'STANDBY', 'Clap twice to arm the wake listener.');
  });
}

function stopRecognitionSafely(){
  if(recognition){
    try{ recognition.onresult=null; recognition.onerror=null; recognition.onend=null; recognition.stop(); }catch(e){}
    recognition = null;
  }
}

// ---------- Answering via Claude ----------
let conversationHistory = []; // [{role, content}]
const MAX_TURNS = 16; // keep last N messages to bound context

const FRIDAY_SYSTEM_PROMPT = `You are FRIDAY, a witty, warm AI assistant (like the one from Iron Man). Address the user as 'boss'. You're having a real spoken conversation, so:
- Keep normal chat answers short: 1-3 spoken sentences, natural and conversational, plain text only, no markdown, no lists, no headers, no emojis.
- Remember what was said earlier in this conversation and refer back to it naturally when relevant.
- If the user asks about news, current events, "what's happening in the world", or anything time-sensitive, ALWAYS use web search first, then give a real spoken news briefing: 3-5 short sentences covering the most important distinct stories, each as one crisp sentence, like a radio anchor. Don't pad with filler like "here's what's happening" — just deliver it.
- If the user asks a follow-up like "tell me more" or "what about the second one", use the conversation history to know what they mean.
- Never say you don't have real-time data — you have live web search, so use it whenever freshness matters.`;

async function handleQuestion(question){
  setState('thinking', 'THINKING', '');
  conversationHistory.push({ role: 'user', content: question });
  if(conversationHistory.length > MAX_TURNS) conversationHistory = conversationHistory.slice(-MAX_TURNS);
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: FRIDAY_SYSTEM_PROMPT,
        messages: conversationHistory,
        tools: [{ type: "web_search_20250305", name: "web_search" }]
      })
    });
    const data = await response.json();
    const answer = (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join(' ').trim()
      || "Sorry boss, I couldn't find an answer to that.";
    conversationHistory.push({ role: 'assistant', content: answer });
    addLine('friday', answer);
    setState('speaking', 'SPEAKING', '');
    speak(answer, ()=>{
      listenForQuestion();
    });
  }catch(err){
    const msg = "Sorry boss, I hit a snag reaching my brain.";
    addLine('friday', msg);
    setState('speaking','SPEAKING','');
    speak(msg, ()=> listenForQuestion());
  }
}

// ---------- UI wiring ----------
startBtn.addEventListener('click', async ()=>{
  if(!SpeechRecognition){
    startErr.style.display='block';
    startErr.textContent = 'Speech recognition is not supported in this browser. Try Chrome or Edge on desktop.';
  }
  try{
    await initMic();
    // warm up voices list
    window.speechSynthesis.getVoices();
    startOverlay.style.display = 'none';
    setState('idle', 'STANDBY', 'Clap twice to arm the wake listener.');
  }catch(err){
    startErr.style.display='block';
    startErr.textContent = 'Microphone access was blocked. Please allow it and try again.';
  }
});

armBtn.addEventListener('click', ()=>{
  if(state === 'idle'){ clapCount = 2; registerClap(); }
});

stopBtn.addEventListener('click', ()=>{
  clearTimeout(armWindowTimer);
  stopRecognitionSafely();
  window.speechSynthesis.cancel();
  conversationHistory = [];
  setState('idle', 'STANDBY', 'Clap twice to arm the wake listener.');
});
</script>
</body>
</html>
